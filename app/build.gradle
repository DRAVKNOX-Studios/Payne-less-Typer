plugins {
    alias libs.plugins.android.application
}

android {
    namespace 'com.swiftlite.keyboard'
    compileSdk 37

    defaultConfig {
        applicationId "com.swiftlite.keyboard"
        minSdk 26
        targetSdk 37
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildFeatures {
        viewBinding true
    }

    packaging {
        resources {
            excludes += ['META-INF/**', '**.kotlin_builtins']
        }
    }
}

tasks.register('syncEmojiShortcodes', Exec) {
    workingDir "${project.rootDir}"
    commandLine 'python3', 'tools/sync_emojis.py'
    // Optional: Only run if data changed
    inputs.file 'app/src/main/assets/emoji_data.json'
    outputs.file 'app/src/main/assets/emoji_shortcodes.json'
}

afterEvaluate {
    tasks.named("preBuild").configure {
        dependsOn "syncEmojiShortcodes"
    }
}

dependencies {
    implementation libs.androidx.appcompat
    implementation libs.androidx.core
    implementation libs.androidx.recyclerview
    implementation libs.androidx.room.runtime
    annotationProcessor libs.androidx.room.compiler
    implementation libs.androidx.emoji2
}
